services:
  api:
    container_name: techNomad-api
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        ENV_EXTENSION: dev
    volumes:
      - ./backend/src/app/:/var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    user: www-data
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    tty: true
    stdin_open: true

  next:
    container_name: techNomad-next
    env_file: ./frontend/next/.env.local
    build:
      context: .
      dockerfile: ./docker/next/Dockerfile
    depends_on:
      - api
    volumes:
      - /app/node_modules
      - ./frontend/next/:/app
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development

  web:
    container_name: techNomad-web
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    ports:
      - ${WEB_PORT:-80}:80
      - "443:443"
      - "8090:8090"
    depends_on:
      - api
      - next
    volumes:
      - ./backend/src/app/:/var/www/html

  # 開発用データベース
  mysql:
    container_name: techNomad-mysql
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: "techNomad"
      MYSQL_USER: "user"
      MYSQL_PASSWORD: "password"
      MYSQL_ROOT_PASSWORD: "password"
    ports:
      - "2000:3306"
    volumes:
      - techNomad-mysql-volume:/var/lib/mysql
      - ./backup:/backup

  # 開発用DB管理ツール
  phpmyadmin:
    container_name: techNomad-phpmyadmin
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "10000:80"
    depends_on:
      - mysql

  # 開発用メールサーバー
  mailhog:
    container_name: techNomad-mailhog
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  techNomad-mysql-volume:
    driver: local
